# Spine GraphRAG Configuration v3.1
# ============================================================================
# This file centralizes all configuration values for the Spine GraphRAG system.
# Environment variables can be referenced using ${VAR_NAME:default_value} syntax.
# ============================================================================

version: "3.1"

# ============================================================================
# Database Settings
# ============================================================================

neo4j:
  # Connection settings
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:spineGraph2024}
  database: ${NEO4J_DATABASE:neo4j}

  # Connection pool settings
  max_connection_pool_size: 50
  connection_timeout: 30

  # Retry settings
  max_retry_time: 30
  max_transaction_retry_time: 15

  # Circuit breaker settings
  circuit_breaker:
    failure_threshold: 5
    success_threshold: 2
    timeout: 60

# ============================================================================
# LLM Settings
# ============================================================================

llm:
  # Provider and model
  provider: "gemini"
  model: "gemini-2.5-flash-preview-05-20"

  # API settings
  api_key: ${GEMINI_API_KEY}

  # Generation settings
  temperature: 0.1
  max_tokens: 8192
  timeout: 60

  # Retry settings
  max_retries: 3
  retry_delay: 1.0

  # Vision model settings
  vision:
    model: "gemini-2.5-flash"
    timeout: 120
    max_pdf_pages: 100

# ============================================================================
# Entity Normalization Settings
# ============================================================================

normalization:
  # Matching thresholds
  fuzzy_threshold: 0.85
  token_overlap_threshold: 0.8
  word_boundary_confidence: 0.95
  partial_match_threshold: 0.5

  # Confidence levels
  exact_match_confidence: 1.0
  alias_match_confidence: 1.0
  token_match_confidence: 0.9
  fuzzy_match_confidence: 0.85

  # Processing settings
  enable_korean_normalization: true
  strip_particles: true

# ============================================================================
# Search Settings
# ============================================================================

search:
  # Default parameters
  default_top_k: 10
  max_top_k: 100

  # Tier boosting
  tier1_boost: 1.5
  tier2_boost: 1.0

  # Section boosting
  section_boost:
    abstract: 1.5
    conclusion: 1.5
    results: 1.3
    methods: 1.0
    introduction: 0.9
    discussion: 1.1
    background: 0.8

  # Evidence level boosting
  evidence_boost:
    enabled: true
    base_boost: 0.5
    max_boost: 1.0

# ============================================================================
# Hybrid Ranker Settings
# ============================================================================

ranker:
  # Default weights
  default_graph_weight: 0.6
  default_vector_weight: 0.4

  # Evidence level weights (Oxford CEBM)
  evidence_weights:
    "1a": 1.0   # Systematic review of RCTs
    "1b": 0.9   # Individual RCT
    "2a": 0.8   # Systematic review of cohort studies
    "2b": 0.7   # Individual cohort study or low-quality RCT
    "3": 0.5    # Case-control study
    "4": 0.3    # Case-series or poor-quality cohort/case-control
    "5": 0.1    # Expert opinion without explicit critical appraisal

  # Significance settings
  significance_threshold: 0.05
  significance_boost: 1.5

  # Key finding boost
  key_finding_boost: 1.2

  # Statistics boost
  statistics_boost: 1.1

  # Normalization
  normalize_scores: true

# ============================================================================
# Conflict Detection Settings
# ============================================================================

conflict:
  # Minimum papers required to detect conflict
  min_papers_for_conflict: 2

  # Statistical significance threshold
  significance_threshold: 0.05

  # Outcome direction thresholds
  direction_change_threshold: 0.1

  # Reporting
  include_conflicting_studies: true
  max_conflicts_to_report: 5

# ============================================================================
# Cache Settings
# ============================================================================

cache:
  # Query cache
  query_cache:
    enabled: true
    max_size: 1000
    ttl: 3600  # 1 hour

  # Embedding cache
  embedding_cache:
    enabled: true
    ttl: 2592000  # 30 days
    max_size: 10000

  # Semantic cache
  semantic_cache:
    enabled: true
    similarity_threshold: 0.85
    max_entries: 1000

  # LLM response cache
  llm_cache:
    enabled: true
    ttl: 86400  # 24 hours
    max_size: 500

  # Cache invalidation
  auto_invalidate: true
  invalidate_on_update: true

# ============================================================================
# Batch Processing Settings
# ============================================================================

batch:
  # Default batch size
  default_batch_size: 10

  # Concurrency settings
  max_concurrency: 5

  # Checkpoint settings
  checkpoint_interval: 10
  checkpoint_dir: "./data/checkpoints"

  # Resume settings
  enable_resume: true
  resume_on_failure: true

  # Progress reporting
  progress_update_interval: 5

# ============================================================================
# Logging Settings
# ============================================================================

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Date format
  date_format: "%Y-%m-%d %H:%M:%S"

  # File logging
  file:
    enabled: false
    path: "./logs/spine_graphrag.log"
    max_bytes: 10485760  # 10MB
    backup_count: 5

  # Console logging
  console:
    enabled: true
    colorize: true

# ============================================================================
# Error Handling Settings
# ============================================================================

error_handling:
  # Retry configuration
  retry:
    max_attempts: 3
    initial_delay: 1.0
    max_delay: 60.0
    exponential_base: 2.0

  # Circuit breaker
  circuit_breaker:
    failure_threshold: 5
    success_threshold: 2
    timeout: 60

  # Error reporting
  report_errors: true
  error_log_path: "./logs/errors.log"

# ============================================================================
# Orchestrator Settings
# ============================================================================

orchestrator:
  # LangChain settings
  verbose: false

  # Cypher generation
  cypher:
    max_attempts: 3
    temperature: 0.0

  # Response synthesis
  synthesis:
    max_tokens: 2048
    temperature: 0.1
    include_evidence: true

# ============================================================================
# MCP Server Settings
# ============================================================================

mcp:
  # Server settings
  host: "localhost"
  port: 8000

  # Tool settings
  enable_all_tools: true

  # Rate limiting
  rate_limit:
    enabled: false
    max_requests_per_minute: 60

# ============================================================================
# Development Settings
# ============================================================================

development:
  # Debug mode
  debug: false

  # Profiling
  enable_profiling: false

  # Test mode
  test_mode: false

  # Mock services
  mock_neo4j: false
  mock_llm: false
